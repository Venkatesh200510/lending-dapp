<!DOCTYPE html>
<html>
<head>
  <title>Lending DApp</title>
</head>
<body>

<h2>Decentralized Lending System</h2>

<button onclick="connectWallet()">Connect MetaMask</button>

<h3>Deposit</h3>
<input id="depositAmount" placeholder="ETH amount">
<button onclick="deposit()">Deposit</button>

<h3>Borrow</h3>
<input id="borrowAmount" placeholder="ETH amount">
<button onclick="borrow()">Borrow</button>

<h3>Repay</h3>
<input id="repayAmount" placeholder="ETH amount">
<button onclick="repay()">Repay</button>

<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
<script src="app.js"></script>

</body>
</html>
